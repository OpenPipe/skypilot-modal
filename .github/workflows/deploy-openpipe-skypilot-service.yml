name: Deploy OpenPipe SkyPilot Service

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: openpipe-skypilot-service-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Check dispatch app credentials
        id: app-credentials
        env:
          APP_ID: ${{ secrets.SKYPILOT_SERVICE_DISPATCH_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.SKYPILOT_SERVICE_DISPATCH_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "${APP_ID}" || -z "${APP_PRIVATE_KEY}" ]]; then
            echo "::warning::SKYPILOT_SERVICE_DISPATCH_APP_ID or SKYPILOT_SERVICE_DISPATCH_APP_PRIVATE_KEY is not set; skipping skypilot-service deploy dispatch."
            echo "has_app_credentials=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_app_credentials=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Mint skypilot-service dispatch token
        id: app-token
        if: ${{ steps.app-credentials.outputs.has_app_credentials == 'true' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SKYPILOT_SERVICE_DISPATCH_APP_ID }}
          private-key: ${{ secrets.SKYPILOT_SERVICE_DISPATCH_APP_PRIVATE_KEY }}
          owner: OpenPipe
          repositories: skypilot-service

      - name: Dispatch skypilot-service deploy
        if: ${{ steps.app-credentials.outputs.has_app_credentials == 'true' }}
        env:
          DISPATCH_TOKEN: ${{ steps.app-token.outputs.token }}
          SKYPILOT_REF: ${{ github.sha }}
          SKYPILOT_SERVICE_REPO: OpenPipe/skypilot-service
        run: |
          payload="$(
            python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              'event_type': 'skypilot-modal-updated',
              'client_payload': {
                  'skypilot_ref': os.environ['SKYPILOT_REF'],
                  'skypilot_sha': os.environ['SKYPILOT_REF'],
                  'source_repository': os.environ['GITHUB_REPOSITORY'],
                  'source_ref': os.environ['GITHUB_REF_NAME'],
                  'source_run_id': os.environ['GITHUB_RUN_ID'],
              },
          }))
          PY
          )"

          echo "Dispatching ${SKYPILOT_SERVICE_REPO} deploy for ${SKYPILOT_REF}"
          http_code="$(curl -sS -o /tmp/dispatch-response -w '%{http_code}' \
            -X POST \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${SKYPILOT_SERVICE_REPO}/dispatches" \
            -d "${payload}")"

          if [[ "${http_code}" != "204" ]]; then
            echo "::error::skypilot-service deploy dispatch failed with HTTP ${http_code}."
            echo "Response body:"
            cat /tmp/dispatch-response || true
            exit 1
          fi

          echo "Dispatch accepted."
